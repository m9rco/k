<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Asset Studio · 宣发素材工作台</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- 顶部品牌栏 -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="1.5" width="29" height="29" rx="7" stroke="url(#bmStroke)" stroke-width="1.6" class="bm-frame" />
          <path d="M16 6 L25 11 V21 L16 26 L7 21 V11 Z" stroke="url(#bmStroke)" stroke-width="1.4" class="bm-hex" />
          <circle cx="16" cy="16" r="3.2" fill="url(#bmStroke)" class="bm-core" />
          <defs>
            <linearGradient id="bmStroke" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5b8cff" />
              <stop offset="1" stop-color="#19e3c2" />
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">Game Asset<strong>Studio</strong></span>
        <span class="brand-tagline">对话式宣发素材工作台</span>
      </span>
    </div>
    <div class="topbar-meta">
      <div class="ctx-panel" id="ctxPanel" title="当前会话上下文">
        <span class="ctx-dot" id="ctxDot"></span>
        <span class="ctx-text" id="ctxText">连接中…</span>
        <span class="ctx-budget" id="ctxBudget"></span>
      </div>
      <button class="ghost-btn" id="clearCtxBtn" title="清理当前会话上下文（不影响工作区）">清上下文</button>
    </div>
  </header>

  <main class="layout">
    <!-- 左：对话区 -->
    <section class="chat" aria-label="对话区">
      <div class="chat-log" id="chatLog">
        <div class="msg msg-system welcome">
          <p class="welcome-title">嗨，我是你的宣发素材助手。</p>
          <p class="welcome-sub">上传一张图，告诉我你想做什么：</p>
          <ul class="cap-list" id="capList"></ul>
        </div>
      </div>

      <!-- 下一步自动补全提示：无依据时隐藏 -->
      <div class="suggest-bar" id="suggestBar" hidden></div>

      <form class="composer" id="composer" autocomplete="off">
        <button type="button" class="icon-btn" id="uploadBtn" title="上传图片">＋</button>
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
        <input type="text" id="msgInput" class="composer-input"
               placeholder="例如：把背景换成夜晚的赛博朋克城市" />
        <button type="button" class="icon-btn optimize-btn" id="optimizeBtn"
                title="优化提示词：把口语化描述改写成更适合生图的提示词" aria-label="优化提示词">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10 2.5 11.4 6.6 15.5 8 11.4 9.4 10 13.5 8.6 9.4 4.5 8 8.6 6.6Z" fill="currentColor"/>
            <path d="M15 12.5 15.7 14.3 17.5 15 15.7 15.7 15 17.5 14.3 15.7 12.5 15 14.3 14.3Z" fill="currentColor" opacity="0.8"/>
          </svg>
        </button>
        <button type="button" class="toggle-btn on" id="losslessBtn"
                title="无损压缩：开启时对 PNG 产物做无损优化" aria-pressed="true">无损</button>
        <button type="submit" class="send-btn" id="sendBtn">发送</button>
      </form>
    </section>

    <!-- 右：工作区 -->
    <section class="workspace" aria-label="工作区">
      <div class="ws-head">
        <h2>工作区</h2>
        <div class="ws-actions">
          <button class="ghost-btn" id="selectAllBtn" hidden>全选</button>
          <button class="ghost-btn" id="batchCropBtn" hidden>批量切尺寸</button>
          <button class="ghost-btn" id="clearWsBtn" hidden>清空</button>
          <button class="primary-btn" id="zipBtn" hidden>打包下载</button>
        </div>
      </div>
      <div class="ws-grid" id="wsGrid">
        <div class="ws-empty" id="wsEmpty">
          <div class="ws-empty-art" aria-hidden="true"></div>
          <p>还没有素材。上传一张图或直接描述你的需求，产物会出现在这里。</p>
        </div>
      </div>

      <!-- 偏好角落：无数据时隐藏 -->
      <aside class="prefs-corner" id="prefsCorner" hidden>
        <h3>偏好</h3>
        <ul id="prefsList"></ul>
      </aside>

      <!-- 未来能力路线图：收敛为可折叠入口，默认收起，让位工作区主视觉 -->
      <details class="roadmap" id="roadmap">
        <summary class="roadmap-summary">
          <span class="roadmap-summary-label">规划中的能力</span>
          <span class="roadmap-summary-hint">查看 Agent 建设方向</span>
          <span class="roadmap-chevron" aria-hidden="true">▾</span>
        </summary>
        <ul class="roadmap-list" id="roadmapList"></ul>
      </details>
    </section>
  </main>

  <!-- 尺寸选择弹层（渠道 → 素材类型 → 尺寸 分层选择器） -->
  <div class="capsule-sheet" id="capsuleSheet" hidden>
    <div class="capsule-card">
      <div class="capsule-head">
        <span id="capsuleTitle">选择目标尺寸</span>
        <button class="icon-btn" id="capsuleClose" title="关闭">×</button>
      </div>
      <div class="capsule-toolbar">
        <input type="search" id="channelSearch" class="channel-search" placeholder="搜索渠道…" autocomplete="off" />
        <div class="channel-groups" id="channelGroupTabs"></div>
      </div>
      <div class="capsule-body">
        <div class="channel-list" id="channelList"></div>
        <div class="size-panel" id="sizePanel"></div>
      </div>
      <div class="capsule-foot">
        <span class="chosen-count" id="chosenCount">已选 0 项</span>
        <button class="primary-btn" id="capsuleConfirm" disabled>裁剪所选</button>
      </div>
    </div>
  </div>

  <!-- toast 容器 -->
  <div class="toasts" id="toasts" aria-live="polite"></div>

  <!-- 资产右键菜单 -->
  <div class="ctx-menu" id="assetMenu" hidden role="menu">
    <button class="ctx-item" data-act="preview" role="menuitem">放大预览</button>
    <button class="ctx-item" data-act="crop" role="menuitem">切尺寸</button>
    <button class="ctx-item" data-act="adjust" role="menuitem">二次调整</button>
    <button class="ctx-item" data-act="download" role="menuitem">下载</button>
    <button class="ctx-item danger" data-act="remove" role="menuitem">移除</button>
  </div>

  <!-- 图片放大/二次调整预览 -->
  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-inner">
      <img id="lightboxImg" alt="预览" />
      <div class="lightbox-actions">
        <button class="ghost-btn" id="lbCropBtn">切尺寸</button>
        <button class="ghost-btn" id="lbDownloadBtn">下载</button>
        <button class="icon-btn" id="lbClose" title="关闭">×</button>
      </div>
      <input type="text" id="lbAdjustInput" class="composer-input"
             placeholder="二次调整：描述你想怎么改这张图" />
      <button class="primary-btn" id="lbAdjustBtn">应用调整</button>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
